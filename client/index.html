<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EcoTrack | Login & Register</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="auth-body">
  <div class="background-pattern"></div>

  <button id="darkModeToggle" class="btn btn-outline theme-fab" type="button">🌙 Dark Mode</button>

  <main class="auth-wrapper">
    <section class="auth-card animate-fade-up">
      <div class="brand-block">
        <h1>EcoTrack <span>🌍</span></h1>
        <p>Track your carbon footprint and build greener habits.</p>
      </div>

      <div class="form-switcher">
        <button id="showLoginBtn" class="switch-btn active" type="button">Login</button>
        <button id="showRegisterBtn" class="switch-btn" type="button">Register</button>
      </div>

      <p id="authError" class="inline-error" aria-live="polite"></p>

      <form id="loginForm" class="auth-form" novalidate>
        <div class="input-group">
          <label for="loginEmail">Email</label>
          <input id="loginEmail" name="email" type="email" placeholder="you@example.com" required />
        </div>

        <div class="input-group">
          <label for="loginPassword">Password</label>
          <input id="loginPassword" name="password" type="password" placeholder="Enter password" required />
        </div>

        <button id="loginBtn" class="btn btn-primary" type="submit">Login</button>

        <p class="switch-text">No account? <button id="toRegisterInline" type="button" class="link-btn">Create one</button></p>
      </form>

      <form id="registerForm" class="auth-form hidden" novalidate>
        <div class="input-group">
          <label for="registerName">Name</label>
          <input id="registerName" name="name" type="text" placeholder="Your full name" required />
        </div>

        <div class="input-group">
          <label for="registerEmail">Email</label>
          <input id="registerEmail" name="email" type="email" placeholder="you@example.com" required />
        </div>

        <div class="input-group">
          <label for="registerPassword">Password</label>
          <input id="registerPassword" name="password" type="password" placeholder="At least 8 characters" required />
        </div>

        <div class="input-group">
          <label for="confirmPassword">Confirm Password</label>
          <input id="confirmPassword" name="confirmPassword" type="password" placeholder="Confirm password" required />
        </div>

        <button id="registerBtn" class="btn btn-primary" type="submit">Register</button>

        <p class="switch-text">Already registered? <button id="toLoginInline" type="button" class="link-btn">Sign in</button></p>
      </form>
    </section>
  </main>

  <div id="loadingOverlay" class="loading-overlay hidden" aria-hidden="true">
    <div class="spinner"></div>
  </div>

  <div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="true"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
